trigger: none

pr:
  branches:
    include:
      - main

jobs:
  - job: SecurityScan
    pool:
      vmImage: ubuntu-latest
    steps:
      - checkout: self
      - task: UsePythonVersion@0
        inputs:
          versionSpec: "3.11"
      - script: pip install -r requirements.txt
        displayName: Install dependencies
      - script: python scanner.py --path . --output results.json --fail-on-high --policy policy.yaml --policy-env prod --no-llm
        displayName: Run scanner
      - publish: results.json
        artifact: scan-results
        condition: always()